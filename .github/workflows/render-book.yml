name: Render Marethar Book (PDF & EPUB)

on:
  push:
    branches: [main]
    paths:
      - "en/**"
      - "_quarto.yml"
      - "filters/**"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX (for PDF)
        run: quarto install tinytex --no-prompt

      - name: Render EPUB
        run: quarto render --to epub

      - name: Render PDF
        run: quarto render --to pdf

      - name: Upload book artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marethar-book
          path: |
            _book/Marethar.epub
            _book/Marethar.pdf
          retention-days: 30
